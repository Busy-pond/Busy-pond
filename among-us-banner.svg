<svg viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg" width="860" height="220">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .stars { fill: #ffffff; }
      .title { font-family: 'Courier New', monospace; font-size: 62px; font-weight: 900; fill: #00C2FF; letter-spacing: 8px; }
      .sub { font-family: 'Courier New', monospace; font-size: 13px; fill: #7EC8E3; letter-spacing: 2px; }

      /* Crewmate walk cycle */
      @keyframes walk1 {
        0%   { transform: translateX(-80px); }
        100% { transform: translateX(920px); }
      }
      @keyframes walk2 {
        0%   { transform: translateX(-160px); }
        100% { transform: translateX(920px); }
      }
      @keyframes walk3 {
        0%   { transform: translateX(-240px); }
        100% { transform: translateX(920px); }
      }
      @keyframes bobA {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-3px); }
      }
      @keyframes bobB {
        0%, 100% { transform: translateY(-3px); }
        50%       { transform: translateY(0px); }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.2; }
      }
      @keyframes fadeIn {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }

      .crew1 { animation: walk1 8s linear infinite; }
      .crew2 { animation: walk2 11s linear infinite; animation-delay: -3s; }
      .crew3 { animation: walk3 14s linear infinite; animation-delay: -7s; }

      .bob1 { animation: bobA 0.4s ease-in-out infinite; }
      .bob2 { animation: bobB 0.4s ease-in-out infinite; }
      .bob3 { animation: bobA 0.4s ease-in-out infinite; animation-delay: -0.15s; }

      .s1 { animation: twinkle 2.1s ease-in-out infinite; }
      .s2 { animation: twinkle 3.4s ease-in-out infinite; animation-delay: -1s; }
      .s3 { animation: twinkle 1.8s ease-in-out infinite; animation-delay: -0.5s; }
      .s4 { animation: twinkle 2.7s ease-in-out infinite; animation-delay: -1.8s; }
      .s5 { animation: twinkle 3.1s ease-in-out infinite; animation-delay: -0.9s; }
      .s6 { animation: twinkle 2.4s ease-in-out infinite; animation-delay: -2.1s; }

      .headline { animation: fadeIn 1.5s ease-out forwards; }
    </style>

    <!-- Crewmate shape as a symbol -->
    <!-- Red crewmate -->
    <g id="red-crew">
      <!-- body -->
      <ellipse cx="18" cy="26" rx="14" ry="16" fill="#C51111"/>
      <!-- head -->
      <ellipse cx="18" cy="12" rx="12" ry="11" fill="#C51111"/>
      <!-- visor -->
      <ellipse cx="21" cy="10" rx="8" ry="6" fill="#7EC8E3" opacity="0.9"/>
      <!-- backpack -->
      <rect x="28" y="20" width="7" height="10" rx="2" fill="#A00E0E"/>
      <!-- left leg -->
      <rect x="10" y="38" width="6" height="7" rx="2" fill="#A00E0E"/>
      <!-- right leg -->
      <rect x="20" y="38" width="6" height="7" rx="2" fill="#A00E0E"/>
    </g>

    <!-- Blue crewmate -->
    <g id="blue-crew">
      <ellipse cx="18" cy="26" rx="14" ry="16" fill="#1C41B0"/>
      <ellipse cx="18" cy="12" rx="12" ry="11" fill="#1C41B0"/>
      <ellipse cx="21" cy="10" rx="8" ry="6" fill="#7EC8E3" opacity="0.9"/>
      <rect x="28" y="20" width="7" height="10" rx="2" fill="#152E80"/>
      <rect x="10" y="38" width="6" height="7" rx="2" fill="#152E80"/>
      <rect x="20" y="38" width="6" height="7" rx="2" fill="#152E80"/>
    </g>

    <!-- Lime crewmate -->
    <g id="lime-crew">
      <ellipse cx="18" cy="26" rx="14" ry="16" fill="#4DB33D"/>
      <ellipse cx="18" cy="12" rx="12" ry="11" fill="#4DB33D"/>
      <ellipse cx="21" cy="10" rx="8" ry="6" fill="#7EC8E3" opacity="0.9"/>
      <rect x="28" y="20" width="7" height="10" rx="2" fill="#358027"/>
      <rect x="10" y="38" width="6" height="7" rx="2" fill="#358027"/>
      <rect x="20" y="38" width="6" height="7" rx="2" fill="#358027"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" class="bg" rx="14"/>

  <!-- Stars -->
  <circle cx="40"  cy="18"  r="1.2" class="stars s1"/>
  <circle cx="120" cy="35"  r="0.9" class="stars s2"/>
  <circle cx="200" cy="12"  r="1.4" class="stars s3"/>
  <circle cx="310" cy="28"  r="1.0" class="stars s4"/>
  <circle cx="430" cy="8"   r="1.3" class="stars s5"/>
  <circle cx="550" cy="22"  r="0.8" class="stars s1"/>
  <circle cx="640" cy="40"  r="1.1" class="stars s6"/>
  <circle cx="740" cy="14"  r="1.5" class="stars s2"/>
  <circle cx="820" cy="32"  r="0.9" class="stars s3"/>
  <circle cx="80"  cy="55"  r="0.8" class="stars s4"/>
  <circle cx="380" cy="50"  r="1.0" class="stars s5"/>
  <circle cx="700" cy="58"  r="1.2" class="stars s6"/>
  <circle cx="500" cy="44"  r="0.7" class="stars s1"/>
  <circle cx="160" cy="62"  r="1.1" class="stars s3"/>
  <circle cx="850" cy="70"  r="0.9" class="stars s2"/>

  <!-- Ground line -->
  <rect x="0" y="188" width="860" height="3" fill="#1a2030"/>
  <rect x="0" y="191" width="860" height="29" fill="#0d1117"/>

  <!-- Floor dots/craters -->
  <ellipse cx="100" cy="194" rx="18" ry="4" fill="#161d2e" opacity="0.6"/>
  <ellipse cx="300" cy="195" rx="12" ry="3" fill="#161d2e" opacity="0.5"/>
  <ellipse cx="560" cy="194" rx="22" ry="4" fill="#161d2e" opacity="0.6"/>
  <ellipse cx="780" cy="195" rx="14" ry="3" fill="#161d2e" opacity="0.5"/>

  <!-- Headline text -->
  <g class="headline">
    <text x="430" y="105" text-anchor="middle" class="title">SHREYA</text>
    <text x="430" y="132" text-anchor="middle" class="sub">AI ENGINEER  •  ROBOTICS LEAD  •  AGENT BUILDER</text>
    <text x="430" y="158" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00C2FF" opacity="0.6" letter-spacing="1">[ MULTI-AGENT AI  ·  GRAPHRAG  ·  EMBEDDED SYSTEMS ]</text>
  </g>

  <!-- Walking crewmates -->
  <g class="crew1">
    <g class="bob1" transform="translate(0, 143)">
      <use href="#red-crew"/>
    </g>
  </g>

  <g class="crew2">
    <g class="bob2" transform="translate(0, 143)">
      <use href="#blue-crew"/>
    </g>
  </g>

  <g class="crew3">
    <g class="bob3" transform="translate(0, 143)">
      <use href="#lime-crew"/>
    </g>
  </g>
</svg>
